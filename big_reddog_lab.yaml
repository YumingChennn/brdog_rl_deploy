
# Simulation time step
simulation_dt: 0.005
# Controller update frequency (meets the requirement of simulation_dt * controll_decimation=0.02; 50Hz)
control_decimation: 4

kps: [ 25, 25, 25, 25,  25, 25, 25, 25,  25, 25, 25, 25]
kds: [ 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]

# kps: [ 40, 40, 40, 40, 40, 40, 40, 40,  40, 40, 40, 40]
# kds: [ 3, 3, 3, 3, 3, 3, 3, 3, 3, 3, 3, 3]

default_angles: [ -0.0, 0.6, -1.0, 
                  0.0, 0.6, -1.0, 
                  -0.0, -0.6, 1.0, 
                  0.0, -0.6, 1.0] # FR FL RR RL

sit_angles: [-0.0, 1.6, -2.8, 0.0, 1.6, -2.8, -0.0, -1.6, 2.8, 0.0, -1.6, 2.8]

ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
gravity_scale: 1.0
action_scale: [ 0.125, 0.25, 0.25, 
                0.125, 0.25, 0.25, 
                0.125, 0.25, 0.25, 
                0.125, 0.25, 0.25] 
cmd_scale: [10.0, 10.0, 1.0]

num_actions: 12
num_obs: 45

cmd_init: [ 0.0, 0.0, 0.0]

# Low-pass filter cutoff frequency (Hz)
# Set to 0 to disable filtering
# Recommended: 10-30 Hz for typical quadruped robots
# obs_lpf_cutoff_hz: 40.0
